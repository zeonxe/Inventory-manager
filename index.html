<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Inventory Manager</title>
  </head>
  <body>
    <div class="msg"></div>
    <div class="table">
      <!--Header row-->
      <div class="row header">
        <div>Item</div>
        <div>Price</div>
        <div>Quantity</div>
        <div>Add/Remove</div>
      </div>

      <!--Item row-->
      <div class="row">
        <div>Turkey Sandwich</div>
        <div>$6.00</div>
        <div>10</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Tuna Sandwich</div>
        <div>$6.99</div>
        <div>8</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Protein Bar</div>
        <div>$1.50</div>
        <div>20</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Chips</div>
        <div>$2.00</div>
        <div>15</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Water Bottle</div>
        <div>$1.00</div>
        <div>19</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Energy Drink</div>
        <div>$2.50</div>
        <div>10</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Apple</div>
        <div>$0.60</div>
        <div>14</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>

      <div class="row">
        <div>Chicken Wrap</div>
        <div>$5.00</div>
        <div>17</div>
        <div class="controls">
          <input type="number" class="amount" value="0" />
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
